<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent; }
      .press-logos { width: 100%; padding: 30px 0; overflow: hidden; }
        .logo-fader { position: relative; width: 100%; min-height: 140px; display: flex; align-items: center; justify-content: center; }
          .logo-group { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; gap: 70px; opacity: 0; animation-timing-function: ease-in-out; animation-fill-mode: both; }
            .logo-group img { height: 60px; width: auto; object-fit: contain; display: block; }
              .logo-group img.rotate { transform: rotate(90deg); }
              
                .group-1 { animation: showGroup1 12s infinite; }
                  .group-2 { animation: showGroup2 12s infinite; }
                    .group-3 { animation: showGroup3 12s infinite; }
                      .group-4 { animation: showGroup4 12s infinite; }
                      
                        @keyframes showGroup1 {
                            0%    { opacity: 1; }
                                22.5% { opacity: 1; }
                                    25%   { opacity: 0; }
                                        100%  { opacity: 0; }
                                          }
                            @keyframes showGroup2 {
                                0%    { opacity: 0; }
                                    25%   { opacity: 0; }
                                        27.5% { opacity: 1; }
                                            47.5% { opacity: 1; }
                                                50%   { opacity: 0; }
                                                    100%  { opacity: 0; }
                                                      }
                            @keyframes showGroup3 {
                                0%    { opacity: 0; }
                                    50%   { opacity: 0; }
                                        52.5% { opacity: 1; }
                                            72.5% { opacity: 1; }
                                                75%   { opacity: 0; }
                                                    100%  { opacity: 0; }
                                                      }
                            @keyframes showGroup4 {
                                0%    { opacity: 0; }
                                    75%   { opacity: 0; }
                                        77.5% { opacity: 1; }
                                            97.5% { opacity: 1; }
                                                100%  { opacity: 0; }
                                                  }
                                                                                                                                          
                            @media (max-width: 768px) {
                                .logo-fader { min-height: 120px; }
                                    .logo-group { gap: 34px; padding: 0 16px; }
                                        .logo-group img { height: 42px; }
                                          }
                                                                                                                                          
                            .logo1  { height: 50px !important; }
                            .logo2  { height: 55px !important; }
                            .logo3  { height: 132px !important; }
                            .logo4  { height: 30px !important; }
                            .logo5  { height: 120px !important; }
                            .logo6  { height: 70px !important; }
                            .logo7  { height: 100px !important; }
                            .logo8  { height: 85px !important; }
                            .logo9  { height: 40px !important; }
                            .logo10 { height: 30px !important; }
                            .logo11 { height: 120px !important; }
                            .logo12 { height: 120px !important; }
                            .logo13 { height: 45px !important; }
                            .logo14 { height: 65px !important; }
                            .logo15 { height: 20px !important; }  /* WSJ */
                            .logo16 { height: 35px !important; }  /* Forbes */
                            .logo17 { height: 55px !important; }  /* People */
                            .logo18 { height: 25px !important; }  /* Daily Wire */
                            .logo19 { height: 40px !important; }  /* ABC News */
                            .logo20 { height: 90px !important; }  /* Good Morning America */
                            .logo21 { height: 25px !important; }  /* The Conservateur */
                            .logo22 { height: 18px !important; max-width: 200px !important; }  /* Martha Stewart */
</style>
